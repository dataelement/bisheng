kind: pipeline
type: docker
name: bisheng_deploy

# =========================================
# 触发条件
# =========================================
trigger:
  branch:
    - feat/2.5.0-sg

  event:
    - push

# =========================================
# 使用 Drone 默认 clone
# depth: 1 提高 clone 速度
# =========================================
clone:
  depth: 1

steps:

  # =========================================
  # frontend 镜像构建
  # =========================================
  - name: build_frontend

    image: docker:24.0.6

    pull: if-not-exists

    privileged: true

    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

    environment:

      # Docker 仓库地址
      DOCKER_REGISTRY: 192.168.106.8:6082

      # frontend 镜像仓库
      DOCKER_REPO: 192.168.106.8:6082/dataelement/bisheng-frontend

      # Docker 用户
      DOCKER_USER:
        from_secret: NEXUS_USER

      # Docker 密码
      DOCKER_PASSWORD:
        from_secret: NEXUS_PASSWORD

    commands:

      # 生成版本号
      - 'VERSION=$(echo $DRONE_COMMIT_SHA | cut -c1-8)'

      - 'echo "======= build frontend ======="'

      - 'echo "当前版本: $VERSION"'

      # 登录 docker 仓库
      - 'echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin $DOCKER_REGISTRY'

      # 进入 frontend 目录
      - 'cd src/frontend'

      # 构建 frontend 镜像
      - 'docker build -t $DOCKER_REPO:$VERSION -t $DOCKER_REPO:latest .'

      # 推送 frontend 镜像
      - 'docker push $DOCKER_REPO:$VERSION'

      - 'docker push $DOCKER_REPO:latest'

  # =========================================
  # backend 部署（源码映射）
  # =========================================
  - name: deploy_backend

    image: appleboy/drone-ssh

    pull: if-not-exists

    settings:

      # 部署服务器
      host: 192.168.106.171

      # SSH 用户
      username: deploy

      # SSH 私钥
      key:
        from_secret: SSH_KEY

      port: 22

      # 最长执行时间
      command_timeout: 20m

      script: |

        set -e

        echo "======= deploy backend ======="

        cd /opt/code/bisheng

        echo "======= reset local changes ======="

        # 防止本地改动导致 pull 冲突
        git reset --hard HEAD

        echo "======= pull latest code ======="

        # 拉取最新代码
        git pull origin feat/2.5.0-sg

        echo "======= migrate database ======="

        # 执行数据库迁移
        docker compose -f docker/docker-compose.yml exec -T backend \
        sh -lc "cd /app && alembic upgrade head"

        echo "======= restart backend ======="

        # 重启 backend 服务
        docker compose -f docker/docker-compose.yml restart backend backend_worker

  # =========================================
  # frontend 部署
  # =========================================
  - name: deploy_frontend

    image: appleboy/drone-ssh

    pull: if-not-exists

    settings:

      # 部署服务器
      host: 192.168.106.171

      # SSH 用户
      username: deploy

      # SSH 私钥
      key:
        from_secret: SSH_KEY

      port: 22

      command_timeout: 20m

      envs:
        - NEXUS_USER
        - NEXUS_PASSWORD

      script: |

        set -e

        echo "======= deploy frontend ======="

        cd /opt/code/bisheng

        echo "======= login docker registry ======="

        # 登录 docker 仓库
        echo "$NEXUS_PASSWORD" | docker login -u "$NEXUS_USER" --password-stdin 192.168.106.8:6082

        echo "======= pull frontend image ======="

        # 拉取最新 frontend 镜像
        docker compose -f docker/docker-compose.yml pull frontend

        echo "======= restart frontend ======="

        # 重建 frontend 容器
        docker compose -f docker/docker-compose.yml up -d frontend

    environment:

      NEXUS_USER:
        from_secret: NEXUS_USER

      NEXUS_PASSWORD:
        from_secret: NEXUS_PASSWORD

  # =========================================
  # 飞书通知
  # =========================================
  - name: notify_result

    image: plugins/webhook

    pull: if-not-exists

    settings:

      urls:
        from_secret: FEISHU_URL

      content_type: application/json

      template: |
        {
          "msg_type": "interactive",
          "card": {
            "type": "template",
            "data": {
              "template_id": "AAqkI9bnY5FUs",
              "template_variable": {
                "repo_name": "{{ repo.name }}",
                "build_branch": "{{ build.branch }}",
                "build_author": "{{ DRONE_COMMIT_AUTHOR }}",
                "link": "{{ build.link }}",
                "commit_msg": "{{ trim build.message }}",
                "status": "{{ build.status }}"
              }
            }
          }
        }

    # 通知失败不影响流水线
    failure: ignore

    when:
      status:
        - success
        - failure

# =========================================
# volumes
# =========================================
volumes:

  - name: docker_sock

    host:
      path: /var/run/docker.sock
