# 数据库配置
database_url:
  "mysql+pymysql://root:gAAAAABlp4b4c59FeVGF_OQRVf6NOUIGdxq8246EBD-b0hdK_jVKRs1x4PoAn0A6C5S6IiFKmWn0Nm5eBUWu-7jxcqw6TiVjQA==@192.168.106.109:3306/bisheng?charset=utf8mb4"

redis_url: "redis://192.168.106.109:6379/10"

celery_redis_url: "redis://192.168.106.109:6379/13"  # 本地用户的celery使用的redis地址
celery_task:
  # 对celery熟悉的用户可以自定义配置任务的路由，启动不同类型的worker处理不同类型的异步任务，注意工作流的执行只能在一个进程内
  task_routers:
    bisheng.worker.knowledge.*: # 知识库文件处理相关任务
      queue: knowledge_celery
    bisheng.worker.workflow.*: # 工作流相关任务
      queue: workflow_celery
# 知识库的milvus和es配置  支持使用 !env ${PATH} 填写环境变量的值, 若环境变量不存在则会报错
vector_stores:
  milvus:
    connection_args: '{ "host": "192.168.106.109","port": "19530","user": "","password": "","secure": false }'
    is_partition: true
    partition_suffix: '1'
  elasticsearch:
    url: 'http://192.168.106.109:9200'
    ssl_verify: '{}'


jwt_secret: 123456789abcdefgakjhsdkaskhdgskhskajhsdkajshdgakjshdgakjshdg


cookie_conf:
  jwt_token_expire_time: 86400  # token过期时间，单位秒，默认1天

# 对象存储， 目前只支持minio
object_storage:
  type: minio
  minio:
    schema: false
    cert_check: false
    endpoint: '192.168.106.109:9100'
    sharepoint: '192.168.106.109:9100'
    share_schema: false
    access_key: 'minioadmin'
    secret_key: 'minioadmin'
    public_bucket: 'bisheng'  # 公共bucket，存储平台上一些需要持久化的文件
    tmp_bucket: 'tmp-dir'  # 临时bucket，会对传到此bucket内的文件设置有效期

linsight_conf:
  debug: true


# 可根据loguru的文档配置不同 handlers
logger_conf:
  # 默认输出到sys.stdout的日志级别, 大于等于此级别都会输出
  level: DEBUG
  # 默认输出格式
  format: '<level>[{time:YYYY-MM-DD HH:mm:ss.SSSSSS}] [{level.name} process-{process.id}-{thread.id} {name}:{line}]</level> - <level>trace={extra[trace_id]} {message}</level>'
  # 参考loguru.add()中的参数可以配置多个handler
  handlers:
    # 文件路径，支持插入一些系统环境变量，若环境变量不存在则置空。例如 HOSTNAME: 主机名。后端会处理环境变量的替换
    - sink: "/Users/shanghang/works/logs/bisheng/bisheng.log"
      # 日志级别
      level: INFO
      # 日志格式化函数，extra内支持trace_id
      format: '<level>[{time:YYYY-MM-DD HH:mm:ss.SSSSSS}] [{level.name} process-{process.id}-{thread.id} {name}:{line}]</level> - <level>trace={extra[trace_id]} {message}</level>'
      # 每天的几点进行切割
      rotation: "00:00"
      retention: "3 Days"
      enqueue: ture

