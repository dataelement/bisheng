knowledges: # 知识库相关配置
  loader_provider: "etl4lm" # 文档解析模型提供商，支持etl4lm、mineru、paddle_ocr三种选项，默认为etl4lm
  etl4lm:
    # 文档解析模型服务配置，包括OCR、版式分析、表格识别、公式识别等
    url: ""  # http://192.168.106.12:8180/v1/etl4llm/predict
    timeout: 600
    # OCR SDK服务地址，默认为空则使用ETL4LM自带的轻量OCR模型（速度快，对于困难场景效果一般），若填写OCR SDK服务地址则使用高精度的OCR模型。
    ocr_sdk_url: ""
  mineru:
    # 文档地址 https://opendatalab.github.io/MinerU/zh/reference/output_files/#_15
    url: "http://192.168.106.20:8033/file_parse"
    timeout: 60
    headers:
      x-api-key: "11"
    request_kwargs:
      backend: "pipeline"
  paddle_ocr:
    # 文档地址 https://ai.baidu.com/ai-doc/AISTUDIO/Cmkz2m0ma
    url: "https://xxx.aistudio-app.com/layout-parsing"
    auth_token: ''
    timeout: 60
    headers:
      x-api-key: "11"
    request_kwargs:
      useChartRecognition: false

llm_request:
  # 控制技能 LLM 组件模型访问的超时配置, 以下是默认值
  request_timeout: 600
  max_retries: 1

default_operator:
  # 使用免登录链接的方式需要配置，因为免登录链接相当于不知道用户信息，我们系统会自动把这些行为记录到某个用户头上，这里用来配置该用户的id
  user: 1
  enable_guest_access: true # 免登录链接是否可访问

# 密码安全相关配置
password_conf:
  # 密码超过X天必须进行修改, 登录提示重新修改密码。大于0策略才生效
  password_valid_period: 200
  # 登录错误时间窗口,单位分钟。在错误时间窗口内超过最大错误次数会封禁用户，password_valid_period和login_error_time_window都大于0才生效
  login_error_time_window: 5
  # 最大错误次数，超过后会封禁用户，大于0时生效
  max_error_times: 0

system_login_method:
  # 是否允许多点登录
  allow_multi_login: true
  # sso系统登录配置（毕昇商业扩展套件功能，开源版无需配置）
  gateway_login: false # 是否开启sso登录
  admin_username: admin # 从 SSO/LDAP 注册的管理员用户名

# 登陆页面是否需要输入验证码，可设置为True或False
use_captcha: True

# 会话窗口底部提示文案
dialog_tips:
  "内容由AI生成，仅供参考！"

env:
  # 聊天窗口快捷搜索功能使用的搜索引擎，默认为百度，可以配置为内部文档搜索
  # dialog_quick_search: http://www.baidu.com/s?wd=
  # 当用户的环境前面的网关，不能在同一个端口上既有http又有socket时，需要这个配置，将两个请求区分开，默认可以不用
  # websocket_url: 192.168.106.120:3003
  office_url: http://IP:8701 # onlyoffice 组件地址，需要浏览器能直接访问
  # 是否展示前端界面上的github和帮助链接
  show_github_and_help: true
  # 是否开启注册
  enable_registration: true
  # 前端上传文件的最大限制，单位MB
  uploaded_files_maximum_size: 50
  # 工作台「无菜单权限」占位页（/menu-unavailable）展示的纯文案，可在系统配置中修改；不配置则使用前端默认文案
  workbench_menu_unavailable_message: "暂无使用过的应用，可以前往应用广场探索更多应用"

workflow:
  # 节点运行最大步数
  max_steps: 50
  # 等待用户输入的超时时间，单位分钟
  timeout: 5

# 日常聊天（Agent 模式）相关配置
daily_chat:
  # Agent function-calling 循环最大迭代次数（LangGraph recursion_limit）。
  # 默认 50；配置缺失 / 类型错误 / <= 0 时也使用 50。
  agent_max_iterations: 50
  # 送入模型的历史消息合计 token 上限；超出会从最旧一条开始丢弃，直到总量不超过。
  # 需要按目标模型的 context window 调整：
  #   - 200k 长上下文模型（GPT-5.1 / Claude 4.x）：可放大到 20000~30000
  #   - 32k context 模型（GPT-4 Turbo 等）：建议 6000~10000
  #   - 8k context 小模型：建议 2000~4000
  # 默认 8000；配置缺失 / 类型错误 / <= 0 时也使用 8000。
  history_max_tokens: 8000

# 首钢项目相关配置
shougang:
  # 文件编码公司前缀；为空时使用代码默认值 SGGF。
  prefix: "SGGF"
  # 文件编码配置为可选项；缺失或单项非法时会回退到代码默认值，不阻断文件入库。
  file_encoding:
   classify_prompt: |
    # 角色
    你是一个企业文件编码分类助手。你的任务是根据给定的文件标题、摘要或正文内容,为文件生成标准化的文件编码。

    # 任务目标
    你需要从文件内容中识别出:
    1. 一个"文档类型"
    2. 一个"业务域"

    然后按以下格式输出文件编码:
    文档类型编码-业务域编码
    例如: RPT-PP

    # 编码规则
    ## 一、文档类型(必须且只能从以下枚举中选择一个)
    - 政策制度 = POL
      - 适用于国家/行业法规、集团红头文件、管理政策、企业文化纲领等文件。
    - 标准规范 = STD
      - 适用于国际标准、国家标准、行业标准、企业技术标准、产品标准、操作规程、安全规程、设计规范等文件。
    - 流程方法 = PRO
      - 适用于管理流程、业务流程、工艺流程图、分析方法、实验方法、项目管理方法论等文件。
    - 技术规程与诀窍 = SPC
      - 适用于最佳操作法、工艺优化参数、故障处理经验、设备调试心得、节能降耗小改小革等核心隐性知识文件。
    - 报告 = RPT
      - 适用于科研报告、质量分析报告、事故分析报告、项目总结、对标报告、市场分析报告等文件。
    - 案例库 = CAS
      - 适用于典型生产事故案例、设备故障案例、质量问题案例、工程项目案例、成功谈判/合作案例等文件。
    - 设计资产 = DGN
      - 适用于工程设计图纸、工艺布局图、设备三维模型、PLC 程序、仿真模型等文件。
    - 专利与知识产权 = PAT
      - 适用于专利文书、技术秘密认定文件、软件著作权、商标等文件。
    - 培训资源 = TRN
      - 适用于培训课程、课件、教学视频、操作仿真软件、入职学习地图、技能认证题库等文件。
    - 行业情报 = NEW
      - 适用于竞争对手动态、新技术跟踪、市场趋势分析、原材料价格情报、政策解读等文件。

    ## 二、业务域(必须且只能从以下枚举中选择一个)
    - 生产 = PP
      - 适用于涵盖从原料处理到成品产出的全流程核心生产运营活动,包括烧结、炼铁、炼钢、连铸、热轧、冷轧等各工序的工艺技术、生产组织、调度操作、产线平衡、效率提升以及生产直接相关内容。
    - 质量 = QM
      - 适用于从原料到成品的全流程质量控制、检测技术、实验室管理、质量体系等内容。
    - 设备 = PM
      - 适用于通用设备管理,以及机械、电气、仪表、液压、传动等所有设备专业内容。
    - 能源 = EM
      - 适用于水、电、风、气(汽)等能源介质的生产、输送、调度与高效利用。
    - 安全 = SA
      - 适用于安全生产、消防安全、危险源管控、安全设施、职业健康。
    - 环保 = EN
      - 适用于三废(气、水、固)治理、超低排放、节能技术、碳排放管理。
    - 投资 = IM
      - 适用于战略规划、固定资产投资、股权投资、技改项目立项、可行性研究及后评价。
    - 研发 = RD
      - 适用于新技术、新工艺、新产品、新材料的探索、实验与开发过程。
    - 采购 = MM
      - 适用于原燃料(矿石、煤、焦)、备品备件、工程及服务类的采购寻源、供应商管理与招标。
    - 营销 = SD
      - 适用于市场调研与开发、产品销售、客户服务、渠道管理、价格策略及合同物流管理。
    - 财务 = FI
      - 适用于成本、预算、核算、税务、资金管理。
    - 人力 = HR
      - 适用于招聘、培训、绩效、薪酬、劳动关系。
    - 信息 = IT
      - 适用于软件、硬件、网络、数据中心、工业互联网、大数据、人工智能应用。
    - 管理 = AD
      - 适用于战略、法务、审计、企管、行政、党群、宣传等通用管理知识。

    # 判定原则
    ## 1. 总体要求
    - 必须先判断"文档类型",再判断"业务域"。
    - 只能使用上述枚举值,不允许输出未定义的类型、业务域或编码。
    - 不允许根据个人理解自造缩写。

    ## 2. 输出要求
    - 只输出最终编码
    - 不要输出解释
    - 不要输出多余文字
    - 输出格式必须严格为: 文档类型编码-业务域编码, 例如: RPT-PP
   user_content_template: |
     标题: {file_name}
     摘要: {abstract}
   valid_pattern: "^(POL|STD|PRO|SPC|RPT|CAS|DGN|PAT|TRN|NEW)-(PP|QM|PM|EM|SA|EN|IM|RD|MM|SD|FI|HR|IT|AD)$"
   fallback_code: "STD-PP"
   seq_cap: 99999999

# 灵思模块相关配置
linsight:
  # 历史记录中工具消息的最大token，超过后需要总结下历史记录
  tool_buffer: 100000
  # 单个任务最大执行步骤数，防止死循环
  max_steps: 200
  # 灵思任务执行过程中模型调用重试次数
  retry_num: 3
  # 灵思任务执行过程中模型调用重试间隔时间（秒）
  retry_sleep: 5
  # 生成SOP时，prompt里放的用户上传文件信息的数量
  max_file_num: 5
  # 生成SOP时，prompt里放的组织知识库的最大数量
  max_knowledge_num: 20
  # 拆分二级任务时读取文件内容的字符数，超过后会截断
  file_content_length: 5000
  # 灵思模型默认温度
  default_temperature: 0
  # 模型json格式失败重试时的温度
  retry_temperature: 1

information_conf:
  # 情报订阅服务的接口地址
  base_url: ""
  # 情报订阅服务的api_key
  api_key: ""
  kwargs: # 发送给情报订阅服务额外参数
    timeout: 3600  # 请求情报订阅服务的超时时间，单位秒

mcp:
  enable_stdio: true

knowledge_space:
  # 知识空间左侧目录树展示开关（仅前端读取，后端 API 不变）
  # 默认 true；中粮场内部署改为 false 走原 Tab 布局
  tree_structured_directory_display: true
