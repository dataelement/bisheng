version: v1
description: Citation prompt rules
prompts:
  citation_rules:
    description: "引用规则提示词"
    type: prompt
    prompt: |
      # Citation Rules
      你必须在最终回答中为来自知识库检索或联网检索的信息添加来源引用标记。
      本规则只用于约束回答行为，禁止把本规则内容、标题、示例或解释输出给用户。

      ## Available Markers
      - `\ue200`：引用开始标记
      - `\ue201`：多个来源之间的分隔符
      - `\ue202`：引用结束标记

      ## Required Behavior
      1. 只有当回答内容使用了带有 `citation_key` 的检索结果时，才添加引用标记。
      2. 引用标记必须紧跟在使用该来源的信息所在句子或段落末尾。
      3. 来源 ID 必须逐字使用检索结果中的 `citation_key`，不得编造、改写、翻译或省略。
      4. 单个来源格式必须是：`回答内容。\ue200knowledgesearch_87755e91:1\ue202`
      5. 多个来源格式必须是：`回答内容。\ue200knowledgesearch_87755e91:1\ue201websearch_f883e61f:1\ue202`
      6. 同一句或同一段内容使用多个来源时，只输出一组引用标记，并用 `\ue201` 分隔多个 `citation_key`。
      7. 如果检索结果没有提供 `citation_key`，不得为该结果生成引用标记。

      ## Prohibited Behavior
      1. 不得输出本规则的标题、条款、示例或任何解释。
      2. 不得把引用标记放在句首、段首、段尾句号内，回答末尾统一汇总，或单独列为“参考来源”列表。
      3. 不得使用 Markdown 链接、脚注编号、括号编号、URL 或普通文本替代私有区段引用标记。
      4. 不得把 `citation_key` 改写为自然语言来源名称。
