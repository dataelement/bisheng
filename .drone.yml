kind: pipeline
type: docker
name: bisheng_deploy

trigger:
  branch:
    - feat/2.5.0-sg
  event:
    - push

clone:
  depth: 1

steps:

  # =========================================
  # 前端镜像构建
  # frontend 仍然使用镜像部署
  # =========================================
  - name: build_frontend

    image: docker:24.0.6
    pull: if-not-exists
    privileged: true

    volumes:
      - name: docker_sock
        path: /var/run/docker.sock

    environment:

      DOCKER_REGISTRY: 192.168.106.8:6082

      DOCKER_REPO: 192.168.106.8:6082/dataelement/bisheng-frontend

      DOCKER_USER:
        from_secret: NEXUS_USER

      DOCKER_PASSWORD:
        from_secret: NEXUS_PASSWORD

    commands:

      - export VERSION=${DRONE_COMMIT_SHA:0:8}

      - echo "======= build frontend ======="

      - echo "$DOCKER_PASSWORD" | docker login \
          -u "$DOCKER_USER" \
          --password-stdin \
          $DOCKER_REGISTRY

      - cd src/frontend

      - docker build \
          -t $DOCKER_REPO:$VERSION \
          -t $DOCKER_REPO:latest \
          .

      - docker push $DOCKER_REPO:$VERSION

      - docker push $DOCKER_REPO:latest

  # =========================================
  # backend 部署
  # 使用源码映射方式
  # =========================================
  - name: deploy_backend

    image: appleboy/drone-ssh
    pull: if-not-exists

    settings:

      host: 192.168.106.171

      # 不建议 root
      username: deploy

      key:
        from_secret: SSH_KEY

      port: 22

      command_timeout: 20m

      script: |

        set -e

        echo "======= deploy backend ======="

        cd /opt/code/bisheng

        echo "======= reset local changes ======="

        # 防止服务器有人改代码导致 pull 冲突
        git reset --hard HEAD

        echo "======= pull latest code ======="

        git pull origin feat/2.5.0-sg

        echo "======= migrate database ======="

        docker compose -f docker/docker-compose.yml \
          exec -T backend \
          sh -lc "cd /app && alembic upgrade head"

        echo "======= restart backend ======="

        docker compose -f docker/docker-compose.yml \
          restart backend backend_worker

  # =========================================
  # frontend 部署
  # =========================================
  - name: deploy_frontend

    image: appleboy/drone-ssh
    pull: if-not-exists

    settings:

      host: 192.168.106.171

      username: deploy

      key:
        from_secret: SSH_KEY

      port: 22

      command_timeout: 20m

      script: |

        set -e

        echo "======= deploy frontend ======="

        cd /opt/code/bisheng

        echo "======= login docker registry ======="

        docker login 192.168.106.8:6082 \
          -u ${NEXUS_USER} \
          -p ${NEXUS_PASSWORD}

        echo "======= pull frontend image ======="

        docker compose -f docker/docker-compose.yml \
          pull frontend

        echo "======= restart frontend ======="

        docker compose -f docker/docker-compose.yml \
          up -d frontend

    environment:

      NEXUS_USER:
        from_secret: NEXUS_USER

      NEXUS_PASSWORD:
        from_secret: NEXUS_PASSWORD

  # =========================================
  # 飞书通知
  # =========================================
  - name: notify_result

    image: plugins/webhook
    pull: if-not-exists

    settings:

      urls:
        from_secret: FEISHU_URL

      content_type: application/json

      template: |
        {
          "msg_type": "interactive",
          "card": {
            "type": "template",
            "data": {
              "template_id": "AAqkI9bnY5FUs",
              "template_variable": {
                "repo_name": "{{ repo.name }}",
                "build_branch": "{{ build.branch }}",
                "build_author": "{{ DRONE_COMMIT_AUTHOR }}",
                "link": "{{ build.link }}",
                "commit_msg": "{{ trim build.message }}",
                "status": "{{ build.status }}"
              }
            }
          }
        }

    failure: ignore

    when:
      status:
        - success
        - failure

volumes:

  - name: docker_sock
    host:
      path: /var/run/docker.sock
