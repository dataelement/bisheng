# MySQL -> DaMeng (DM8) data-migration config for migrate_mysql_to_dm.py
#
# This script copies DATA ONLY. Create the target DM schema FIRST:
#   bisheng          : start the backend once against the DM URL, or run
#                      `alembic upgrade head` against it.
#   bisheng_gateway  : execute docker/db/init_dm.sql on the BISHENG_GATEWAY schema.
#   openfga          : openfga migrate --datastore-engine dm --datastore-uri 'dm://...'
#
# CONNECTION SETTINGS VIA ENV VARS
# --------------------------------
# Every account / password / ip / port below is a ${VAR} / ${VAR:-default}
# placeholder, expanded from the shell environment. Override any of them by
# exporting the variable before running the script, or by editing the defaults
# block in the migrate_mysql_to_dm.sh wrapper:
#
#   MySQL source:
#     MYSQL_HOST     (default 127.0.0.1)   MySQL server ip / host
#     MYSQL_PORT     (default 3306)        MySQL server port
#     MYSQL_USER     (default root)        MySQL account
#     MYSQL_PASSWORD (required, no default) MySQL password
#
#   DaMeng (DM8) target — login account (DM_*_USER) is separate from the target
#   schema (DM_*_SCHEMA); they differ in a one-account / multi-schema deployment:
#     DM_HOST              (default 127.0.0.1)  DM server ip / host
#     DM_PORT              (default 5236)       DM server port
#     DM_BISHENG_USER      (default BISHENG)          login account for bisheng
#     DM_BISHENG_SCHEMA    (default BISHENG)          target schema for bisheng
#     DM_BISHENG_PASSWORD  (required)                 password for that account
#     DM_GATEWAY_USER      (default BISHENG_GATEWAY)  login account for the gateway
#     DM_GATEWAY_SCHEMA    (default BISHENG_GATEWAY)  target schema for the gateway
#     DM_GATEWAY_PASSWORD  (required)                 password for that account
#     DM_OPENFGA_USER      (default OPENFGA)          login account for openfga
#     DM_OPENFGA_SCHEMA    (default OPENFGA)          target schema for openfga
#     DM_OPENFGA_PASSWORD  (required)                 password for that account
#
# Example — one DM account 'jt_aizsk' writing into three separate schemas:
#   export MYSQL_HOST=10.0.0.5 MYSQL_PORT=3306 MYSQL_USER=root MYSQL_PASSWORD=xxx
#   export DM_HOST=192.168.107.9 DM_PORT=5236
#   export DM_BISHENG_USER=jt_aizsk DM_GATEWAY_USER=jt_aizsk DM_OPENFGA_USER=jt_aizsk
#   export DM_BISHENG_SCHEMA=BISHENG DM_GATEWAY_SCHEMA=BISHENG_GATEWAY DM_OPENFGA_SCHEMA=OPENFGA
#   export DM_BISHENG_PASSWORD=yyy DM_GATEWAY_PASSWORD=yyy DM_OPENFGA_PASSWORD=yyy
#   bash scripts/migrate_mysql_to_dm.sh --config scripts/migrate_dm.yaml --dry-run
#
# DSN formats:
#   MySQL source : mysql+pymysql://user:pass@host:port/dbname?charset=utf8mb4
#   DM target    : dm+dmPython://user:pass@host:port/?schema=SCHEMA
#
# DM SCHEMA IS CARRIED IN ?schema= (NOT the path)
# -----------------------------------------------
# dmPython.connect() has no `database` arg and rejects a URL path; DaMeng selects
# the active schema via the `schema` connect kwarg, passed through the query
# string. So the target schema goes in ?schema= (the script also accepts a legacy
# /SCHEMA path and normalizes it to ?schema=). The script both connects with that
# schema AND qualifies all reflection + DML to it (get_table_names(schema=...),
# "SCHEMA"."TABLE", OWNER=:schema). Two deployments:
#
#   * One DM account, MULTIPLE schemas (e.g. login as jt_aizsk, but bisheng /
#     bisheng_gateway / openfga live in their OWN schemas): set DM_*_USER to the
#     single login account and DM_*_SCHEMA to each target schema. Every job lands
#     in its own schema even though all log in with the same account. The schema
#     must already exist (the login user needs privileges on it) — the script
#     aborts at startup listing the available schemas if it does not.
#
#   * One account == one schema (DM user name == schema name): leave DM_*_SCHEMA
#     defaulting to the conventional schema name (== DM_*_USER default).
#
# As an extra guard for a shared schema, each job is also scoped to its own MySQL
# source DB's table list (only tables in BOTH the source DB and the target schema
# are copied), and the script warns at startup if a table name appears in more
# than one source DB (they would otherwise overwrite each other on a shared schema).

databases:
  bisheng:
    source_url: "mysql+pymysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD}@${MYSQL_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}/bisheng?charset=utf8mb4"
    target_url: "dm+dmPython://${DM_BISHENG_USER:-BISHENG}:${DM_BISHENG_PASSWORD}@${DM_HOST:-127.0.0.1}:${DM_PORT:-5236}/?schema=${DM_BISHENG_SCHEMA:-BISHENG}"
    # include: []   # empty = every table reflected on the DM target
    exclude:
      - alembic_version   # already excluded by default, listed here for clarity

  bisheng_gateway:
    source_url: "mysql+pymysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD}@${MYSQL_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}/bisheng_gateway?charset=utf8mb4"
    target_url: "dm+dmPython://${DM_GATEWAY_USER:-BISHENG_GATEWAY}:${DM_GATEWAY_PASSWORD}@${DM_HOST:-127.0.0.1}:${DM_PORT:-5236}/?schema=${DM_GATEWAY_SCHEMA:-BISHENG_GATEWAY}"

  openfga:
    source_url: "mysql+pymysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD}@${MYSQL_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}/openfga?charset=utf8mb4"
    target_url: "dm+dmPython://${DM_OPENFGA_USER:-OPENFGA}:${DM_OPENFGA_PASSWORD}@${DM_HOST:-127.0.0.1}:${DM_PORT:-5236}/?schema=${DM_OPENFGA_SCHEMA:-OPENFGA}"
    # goose_db_version (openfga's goose migration-version table) is skipped
    # by default — it is owned by `openfga migrate` on the DM side.
