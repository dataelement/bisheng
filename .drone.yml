kind: pipeline
type: docker
name: feat_cicd

# 禁用 Drone 默认 clone
clone:
  disable: true

steps:

  # =========================================
  # 手动 clone（保留你原版）
  # 因为默认 clone 不走代理
  # =========================================
  - name: clone

    image: alpine/git

    pull: if-not-exists

    environment:

      http_proxy:
        from_secret: PROXY

      https_proxy:
        from_secret: PROXY

    commands:

      - 'git config --global http.version HTTP/1.1'

      - 'git config --global core.compression 0'

      - 'git clone https://github.com/dataelement/bisheng.git .'

      - 'git checkout $DRONE_COMMIT'

  # =========================================
  # frontend 镜像构建
  # =========================================
  - name: build_frontend

    image: docker:24.0.6

    pull: if-not-exists

    privileged: true

    volumes:
      - name: socket
        path: /var/run/docker.sock

    environment:

      http_proxy:
        from_secret: PROXY

      https_proxy:
        from_secret: PROXY

      no_proxy: 192.168.106.8

      DOCKER_REGISTRY: http://192.168.106.8:6082

      DOCKER_REPO: 192.168.106.8:6082/dataelement/bisheng-frontend

      DOCKER_USER:
        from_secret: NEXUS_USER

      DOCKER_PASSWORD:
        from_secret: NEXUS_PASSWORD

    commands:

      - 'VERSION=2.5.0-sg'

      - 'echo "======= build frontend ======="'

      - 'echo "当前版本: $VERSION"'

      # 登录 docker 仓库
      - 'echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin $DOCKER_REGISTRY'

      - 'cd src/frontend'

      # 构建 frontend 镜像
      - 'docker build --build-arg http_proxy=$http_proxy --build-arg https_proxy=$https_proxy -t $DOCKER_REPO:$VERSION .'

      # 推送镜像
      - 'docker push $DOCKER_REPO:$VERSION'


  # =========================================
  # backend 镜像构建
  # =========================================
  - name: build_backend

    image: docker:24.0.6

    pull: if-not-exists

    privileged: true

    volumes:
      - name: socket
        path: /var/run/docker.sock

    environment:

      http_proxy:
        from_secret: PROXY

      https_proxy:
        from_secret: PROXY

      no_proxy: 192.168.106.8

      DOCKER_REGISTRY: http://192.168.106.8:6082

      DOCKER_REPO: 192.168.106.8:6082/dataelement/bisheng-backend

      DOCKER_USER:
        from_secret: NEXUS_USER

      DOCKER_PASSWORD:
        from_secret: NEXUS_PASSWORD

    commands:

      - 'VERSION=2.5.0-sg'

      - 'echo "======= build backend ======="'

      - 'echo "当前版本: $VERSION"'

      # 登录 docker 仓库
      - 'echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin $DOCKER_REGISTRY'

      - 'cd src/backend'

      # 构建 backend 镜像
      - 'docker build --build-arg http_proxy=$http_proxy --build-arg https_proxy=$https_proxy -t $DOCKER_REPO:$VERSION .'

      # 推送镜像
      - 'docker push $DOCKER_REPO:$VERSION'

  # =========================================
  # backend 部署（源码映射）
  # =========================================
  - name: deploy_backend

    image: appleboy/drone-ssh

    pull: if-not-exists

    settings:

      host: 192.168.106.171

      username: root

      password:
        from_secret: sshpwd

      port: 22

      command_timeout: 20m

      script: |

        set -e

        echo "======= deploy backend ======="

        export https_proxy=http://118.195.232.223:39995
        export http_proxy=http://118.195.232.223:39995
        export all_proxy=socks5://118.195.232.223:39995

        cd /opt/code/bisheng

        echo "======= reset local changes ======="

        git reset --hard HEAD

        echo "======= pull latest code ======="

        git pull origin feat/2.5.0-sg

        echo "======= restart backend ======="

        docker compose -f docker/docker-compose.yml restart backend backend_worker

  # =========================================
  # frontend 部署
  # =========================================
  - name: deploy_frontend

    image: appleboy/drone-ssh

    pull: if-not-exists

    environment:

      NEXUS_USER:
        from_secret: NEXUS_USER

      NEXUS_PASSWORD:
        from_secret: NEXUS_PASSWORD

    settings:

      host: 192.168.106.171

      username: root

      password:
        from_secret: sshpwd

      port: 22

      command_timeout: 20m

      envs:
        - NEXUS_USER
        - NEXUS_PASSWORD

      script: |

        set -e

        echo "======= deploy frontend ======="

        export https_proxy=http://118.195.232.223:39995
        export http_proxy=http://118.195.232.223:39995
        export all_proxy=socks5://118.195.232.223:39995

        cd /opt/code/bisheng

        echo "======= login docker registry ======="

        echo "$NEXUS_PASSWORD" | docker login cr.dataelem.com -u "$NEXUS_USER" --password-stdin

        echo "======= pull frontend image ======="

        docker compose -f docker/docker-compose.yml pull frontend

        echo "======= restart frontend ======="

        docker compose -f docker/docker-compose.yml up -d frontend

  # =========================================
  # 飞书通知
  # =========================================
  - name: notify_result

    image: plugins/webhook

    pull: if-not-exists

    settings:

      debug: true

      urls:
        from_secret: FEISHU_URL

      content_type: application/json

      template: |
        {
          "msg_type": "interactive",
          "card": {
            "type": "template",
            "data": {
              "template_id": "AAqkI9bnY5FUs",
              "template_variable": {
                "repo_name": "{{ repo.name }}",
                "build_branch": "{{ build.branch }}",
                "build_author": "{{ DRONE_COMMIT_AUTHOR }}",
                "link": "{{ build.link }}",
                "commit_msg": "{{ trim build.message }}",
                "status": "{{ build.status }}"
              }
            }
          }
        }

    failure: ignore

    when:
      status:
        - success
        - failure

trigger:

  branch:
    - feat/2.5.0-sg

  event:
    - push

volumes:

  - name: socket

    host:
      path: /var/run/docker.sock
